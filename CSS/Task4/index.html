<!DOCTYPE html>
<html>
<head>
    <title>Product Display</title>

    <style>

        .product{
            display:inline-block;
            width:220px;
           
            border:2px solid black;
            background-color:lightgray;
            padding:15px;
            margin:15px;
            text-align:center;
        }

        .product:hover{
            outline:3px solid blue;
            outline-offset:5px;
        }

        img{
            width:120px;
            height:120px;
        }

        div a{
            text-decoration:none;
            color:blue;
        }

    </style>

</head>

<body>


<h1>Online Store</h1>

<div class="product">

    <img src= "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=300" alt="Laptop">

    <h2>Laptop</h2>

    <p>Good for study and office work.</p>

    <h3>$700</h3>

    <a href="#">Buy Now</a>

</div>


<div class="product">

   <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" alt="Headphones">
    <h2>Headphones</h2>

    <p>Clear sound and comfortable to use.</p>

    <h3>$80</h3>

    <a href="#">Buy Now</a>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300" alt="Smartwatch">

    <h2>Smartwatch</h2>

    <p>Track your health and daily activity.</p>

    <h3>$150</h3>

    <a href="#">Buy Now</a>

</div>

</body>
</html>
