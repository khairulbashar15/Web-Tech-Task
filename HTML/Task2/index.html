<!DOCTYPE html>
<html>
    <head>
        <title>
              University Admission Form
    </title>

    </head>
    <body>

        <h2>
            University Admission Form
        </h2>

        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <label>Name</label>
                <input 
                type="text"
                name="name"
                placeholder="Enter Your name"
                required/>
                <br>

                <label>Email</label>
                <input
                type="email"
                name="email"
                placeholder="Enter Your mail"
                required/>
                <br>

                <label>Date of Birth</label>
                <input
                type="date"
                name="dob"
                required/>
                <br>

                <label>Gender</label>
                <input 
                type="radio" 
                name="gender" 
                value="Male"/> Male
                <input 
                type="radio" 
                name="gender" 
                value="Female"/> Female
                <input  
                type="radio"
                name="gender
                value="Other"/> Other

                <br>

                <legend>Interest:</legend>
                 <input 
                 type="checkbox" 
                 name="interest" 
                 value="Sports"/> Sports
                 <input 
                 type="checkbox" 
                 name="interest" 
                 value="Programming"/> Programming
                 <input 
                 type="checkbox" 
                 name="interest" 
                 value="Reading"/> Reading


            </fieldset>

            <fieldset>
                <legend>Academic Information</legend>
                <label>Institute Name</label>
                 <input 
                 type="text"
                 name="college" 
                 maxlength="50"
                 placeholder="Enter your institute name" 
                 required/>
                 <br>

                 <label>GPA</label>
                 <input 
                 type="text"
                 name="gpa" 
                 placeholder="Enter your GPA" 
                 required>
                 <br>

                 <label>Preferred department</label>
                  <select>
                  <option value="">Select an option</option>
                  <option value="CSE" selected>CSE</option>
                  <option value="EEE">EEE</option>
                  <option value="BBA">BBA</option>
                  <option value="ECO">ECO</option>
                  </select>
                  <br>

                  <label>Class Time</label>
                  <input type="time" />
                  <br >

                  <label>Document</label>
                  <input 
                  type="file" 
                  name="document" 
                  required>


                  
                  </fieldset>

                  <input
                  type="Submit"
                  value="Submit"/>
                  <input
                  type="Reset"
                  value="Reset"/>







            
        </form>

    </body>
</html>
